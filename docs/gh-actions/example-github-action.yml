name: Mimosa GitHub Action Example

on:
  pull_request:

permissions:
  contents: write

jobs:
  example-github-action:
    name: "Registry-based caching example"
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup mimosa
        id: setup-mimosa
        uses: hytromo/mimosa/gh/setup-action@v2-setup
        with:
          version: v0.1.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::947281064882:role/mimosa-github-actions-role
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: hytromo
          password: ${{ secrets.DOCKER_PAT }}

      - name: Retag-only check (Docker Hub)
        id: retag-dockerhub
        uses: hytromo/mimosa/gh/build-push-action@v6-build-push
        with:
          mimosa-retag-only: true
          context: &mimosa_context docs/gh-actions/actions-example
          platforms: &mimosa_platforms linux/amd64,linux/arm64
          push: true
          tags: hytromo/mimosa-testing:recommended-example-${{ github.sha }}

      - name: Retag-only check (ECR)
        id: retag-ecr
        uses: hytromo/mimosa/gh/build-push-action@v6-build-push
        with:
          mimosa-retag-only: true
          context: *mimosa_context
          platforms: *mimosa_platforms
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/mimosa-testing:recommended-example-${{ github.sha }}

      - name: Set up QEMU
        if: steps.retag-dockerhub.outputs.mimosa-cache-hit != 'true' || steps.retag-ecr.outputs.mimosa-cache-hit != 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.retag-dockerhub.outputs.mimosa-cache-hit != 'true' || steps.retag-ecr.outputs.mimosa-cache-hit != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Prepare build context
        if: steps.retag-dockerhub.outputs.mimosa-cache-hit != 'true' || steps.retag-ecr.outputs.mimosa-cache-hit != 'true'
        working-directory: docs/gh-actions/actions-example
        run: |
          echo $RANDOM > to-ignore.txt
          echo "${{ github.sha }}-${RANDOM}-$(date)" > useful.txt

      - name: Build and push to Docker Hub
        id: build-dockerhub
        if: steps.retag-dockerhub.outputs.mimosa-cache-hit != 'true'
        uses: hytromo/mimosa/gh/build-push-action@v6-build-push
        with:
          context: *mimosa_context
          platforms: *mimosa_platforms
          push: true
          tags: hytromo/mimosa-testing:recommended-example-${{ github.sha }}

      - name: Build and push to ECR
        id: build-ecr
        if: steps.retag-ecr.outputs.mimosa-cache-hit != 'true'
        uses: hytromo/mimosa/gh/build-push-action@v6-build-push
        with:
          context: *mimosa_context
          platforms: *mimosa_platforms
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/mimosa-testing:recommended-example-${{ github.sha }}

      ### That's it! - the next steps are just proving that the cache is working - you DO NOT need to include them in your typical workflow
      - name: Prepare build context for cache verification
        working-directory: docs/gh-actions/actions-example
        run: |
          # Change an ignored file - this should NOT affect the hash
          echo $RANDOM > to-ignore.txt

      - name: Build and push to Docker Hub (cache verification)
        id: build-dockerhub-cache-hit
        uses: hytromo/mimosa/gh/build-push-action@v6-build-push
        with:
          context: *mimosa_context
          platforms: *mimosa_platforms
          push: true
          tags: hytromo/mimosa-testing:recommended-example-cache-hit-${{ github.sha }}

      - name: Build and push to ECR (cache verification)
        id: build-ecr-cache-hit
        uses: hytromo/mimosa/gh/build-push-action@v6-build-push
        with:
          context: *mimosa_context
          platforms: *mimosa_platforms
          push: true
          tags: ${{ steps.login-ecr.outputs.registry }}/mimosa-testing:recommended-example-cache-hit-${{ github.sha }}
